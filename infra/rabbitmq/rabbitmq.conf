# ──────────────────────────────────────────────────────────────────────────────
# RabbitMQ Configuration — Bank B Internal Bus
# ──────────────────────────────────────────────────────────────────────────────

# Load queue/exchange definitions on startup
management.load_definitions = /etc/rabbitmq/definitions.json

# Enable management plugin
management.tcp.port = 15672

# Heartbeat (seconds) — keeps connections alive through load balancers
heartbeat = 60

# Message store limits (PoC)
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 1GB

# Consumer ACK timeout (ms) — fail fast if worker crashes mid-processing
consumer_timeout = 30000
